services:
  - type: web
    name: sma-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sma-db
          property: connectionString

databases:
  - name: sma-db
    databaseName: sma
    user: sma
    plan: free
